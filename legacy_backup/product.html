<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk — Retina CCTV</title>
    <meta name="description" content="Detail produk CCTV dari Retina Security Technology">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>">
</head>

<body>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <div class="brand-icon">🔒</div>
                RETINA <span>CCTV</span>
            </a>

            <div class="navbar-links">
                <a href="index.html">Produk</a>
                <a href="https://retinacctv.id" target="_blank">Website Utama</a>
                <a href="cart.html" class="cart-link">
                    🛒 Keranjang
                    <span class="cart-badge">0</span>
                </a>
            </div>

            <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <div class="mobile-menu" id="mobile-menu">
            <a href="index.html">📋 Produk</a>
            <a href="https://retinacctv.id" target="_blank">🌐 Website Utama</a>
            <a href="cart.html" class="mobile-cart-link">
                🛒 Keranjang
                <span class="cart-badge">0</span>
            </a>
        </div>
    </nav>

    <!-- ═══ PRODUCT DETAIL ═══ -->
    <main class="product-detail-page">
        <div class="container">
            <a href="index.html" class="back-link">← Kembali ke Produk</a>
        </div>

        <div class="product-detail" id="product-detail">
            <!-- Loading skeleton -->
            <div class="detail-image-wrapper">
                <div class="skeleton-image" style="width:100%;height:100%;aspect-ratio:1;"></div>
            </div>
            <div class="detail-info">
                <div class="skeleton-text" style="width:80px;height:24px;margin:0 0 12px;border-radius:50px;"></div>
                <div class="skeleton-text" style="width:100%;height:28px;margin:0 0 16px;"></div>
                <div class="skeleton-text" style="width:150px;height:32px;margin:0 0 16px;"></div>
                <div class="skeleton-text" style="width:120px;height:36px;margin:0 0 24px;"></div>
                <div class="skeleton-button" style="height:48px;margin:0 0 10px;"></div>
                <div class="skeleton-button" style="height:48px;margin:0;"></div>
            </div>
        </div>
    </main>

    <!-- ═══ RELATED PRODUCTS ═══ -->
    <section class="related-section">
        <h2>Produk Terkait</h2>
        <div id="related-products"></div>
    </section>

    <!-- ═══ BOTTOM NAVIGATION (MOBILE) ═══ -->
    <nav class="bottom-nav" id="bottom-nav">
        <a href="index.html" class="bnav-item">
            <span class="bnav-icon">🏠</span>
            <span class="bnav-label">Beranda</span>
        </a>
        <a href="index.html#products-section" class="bnav-item">
            <span class="bnav-icon">🔍</span>
            <span class="bnav-label">Cari</span>
        </a>
        <a href="cart.html" class="bnav-item bnav-cart">
            <div class="bnav-icon-wrapper">
                <span class="bnav-icon">🛒</span>
                <span class="cart-badge">0</span>
            </div>
            <span class="bnav-label">Keranjang</span>
        </a>
        <a href="#" class="bnav-item" id="bnav-wa" target="_blank">
            <span class="bnav-icon">💬</span>
            <span class="bnav-label">Bantuan</span>
        </a>
    </nav>

    <!-- ═══ FOOTER ═══ -->
    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-text">© 2026 Retina Security Technology. All rights reserved.</span>
            <div class="footer-links">
                <a href="https://retinacctv.id" target="_blank">Website Utama</a>
                <a href="https://retinacctv.id/instalasi/" target="_blank">Instalasi</a>
            </div>
        </div>
    </footer>

    <!-- ═══ FLOATING WHATSAPP ═══ -->
    <a href="" id="wa-float" class="wa-float" target="_blank" aria-label="WhatsApp">💬</a>

    <!-- ═══ SCRIPTS ═══ -->
    <script src="js/config.js"></script>
    <script src="js/sheets.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const productId = getUrlParam('id');
            if (!productId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const product = await SheetsAPI.getProductById(productId);
                if (!product) {
                    window.location.href = 'index.html';
                    return;
                }

                renderProductDetail(product);
                Products.loadRelated(product.id, product.kategori);

                // Update page title
                document.title = `${product.nama} — Retina CCTV`;

                // Set WhatsApp links
                const waMessage = `Halo, saya tertarik dengan produk: ${product.nama} (${formatPrice(product.harga)})`;
                const waLink = `https://wa.me/${CONFIG.WA_NUMBER}?text=${encodeURIComponent(waMessage)}`;

                const waFloat = document.getElementById('wa-float');
                if (waFloat) waFloat.href = waLink;

                const bnavWa = document.getElementById('bnav-wa');
                if (bnavWa) bnavWa.href = waLink;
            } catch (error) {
                console.error('Error loading product:', error);
            }
        });

        let currentQty = 1;

        function renderProductDetail(product) {
            const container = document.getElementById('product-detail');
            const stockClass = product.stok > 5 ? 'in-stock' : product.stok > 0 ? 'low-stock' : 'out-of-stock';
            const stockText = product.stok > 5 ? `Stok tersedia: ${product.stok} unit` : product.stok > 0 ? `Sisa ${product.stok} unit` : 'Stok Habis';
            const isDisabled = product.stok === 0;

            container.innerHTML = `
        <div class="detail-image-wrapper">
          <img src="${product.gambar}" alt="${product.nama}"
               onerror="this.src='${CONFIG.PLACEHOLDER_IMAGE}'">
        </div>
        <div class="detail-info">
          <span class="detail-category">${product.kategori}</span>
          <h1 class="detail-name">${product.nama}</h1>
          <div class="detail-price">${formatPrice(product.harga)}</div>

          <div class="detail-stock ${stockClass}">
            <span class="dot"></span>
            ${stockText}
          </div>

          <div class="quantity-selector" ${isDisabled ? 'style="opacity:0.4;pointer-events:none"' : ''}>
            <button onclick="changeQty(-1, ${product.stok})">−</button>
            <input type="number" class="qty-value" id="qty-input" value="1" min="1" max="${product.stok}"
                   onchange="currentQty = Math.max(1, Math.min(${product.stok}, parseInt(this.value) || 1)); this.value = currentQty;">
            <button onclick="changeQty(1, ${product.stok})">+</button>
          </div>

          <div class="detail-actions">
            <button class="btn-primary" ${isDisabled ? 'disabled' : ''}
                    onclick="addProductToCart('${product.id}')">
              🛒 Tambah ke Keranjang
            </button>
            <a href="https://wa.me/${CONFIG.WA_NUMBER}?text=${encodeURIComponent(`Halo, saya tertarik dengan: ${product.nama} (${formatPrice(product.harga)})`)}"
               target="_blank" class="btn-secondary">
              💬 Tanya via WhatsApp
            </a>
          </div>

          <div class="detail-description">
            <h3>Deskripsi Produk</h3>
            <p>${product.deskripsi || 'Tidak ada deskripsi tersedia.'}</p>
          </div>
        </div>
      `;
        }

        function changeQty(delta, maxStock) {
            currentQty = Math.max(1, Math.min(maxStock, currentQty + delta));
            document.getElementById('qty-input').value = currentQty;
        }

        async function addProductToCart(productId) {
            const product = await SheetsAPI.getProductById(productId);
            if (product) {
                Cart.addItem(product, currentQty);
            }
        }
    </script>
</body>

</html>
